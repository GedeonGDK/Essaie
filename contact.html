<!DOCTYPE html> 
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../public/css/vendors/bootstrap.css">
    <link rel="stylesheet" href="../public/css/style.css">
    <title>Contact</title>
	<style>
	div.contact {
	  margin: 0px;
	  padding: 0px;
	  position: absolute;
	  top: 60%;
	  left: 50%;
	  transform: translate(-50%, -50%);
	  font-weight: bold;
	}

form {
  padding: 30px;
  background-color: #FFFFFF;
  border-radius: 10px;
	margin-top: 170px;
}
form h1 {
  font-size: 20px;
}
form .separation {
  width: 100%;
  height: 1px;
  background-color: #00198E;
}
form .corps-formulaire {
  display: flex;
  flex-wrap: wrap;
  margin-bottom: 30px;
}
form .corps-formulaire .groupe {
  position: relative; /* Pour mettre positionner l’élément dans le flux normal de la page */
  margin-top: 20px;
  display: flex;
  flex-direction: column;
}
form .corps-formulaire .gauche .groupe input {
  margin-top: 5px;
  padding: 10px 5px 10px 30px;
  border: 1px solid #c9c9c9;
  outline-color: #747cdf;
  border-radius: 5px;
}
form .corps-formulaire .gauche .groupe i {
  position: absolute; /* positionné par rapport à son parent le plus proche positionné */
  left: 0;
  top: 25px;
  padding: 9px 8px;
  color: #747cdf;
}
form .corps-formulaire .droite {
  margin-left: 40px;
}
form .corps-formulaire .droite .groupe {
  height: 100%;
}
form .corps-formulaire .droite .groupe textarea {
  margin-top: 5px;
  padding: 10px;
  background-color: #f1f1f1;
  border: 2px solid #B5BCB1;
  outline: none;
  border-radius: 5px;
  resize: none;
  height: 72%;
}
form .pied-formulaire button {
  margin-top: 10px;
  background-color: #1A19AC;
  color: white;
  font-size: 15px;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  outline: none;
  cursor: pointer;
  transition: transform 0.5s;
}
form .pied-formulaire button:hover {
  transform: scale(1.05);
}
	</style>
</head>
<body>
	<header class="index">
		<nav>
           <div class="logo">
              <h2><a href="">Gédéon KALALA</a></h2>
            </div>
			<div class="toggle">
                <i class="fas fa-bars ouvrir"></i>
                <i class="fas fa-times fermer"></i>
            </div>
            <ul class="menu">
                <li><a href="../index.html">Acceuil</a></li>
                <li><a href="apropos.html">Apropos</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
	</header>
	<div class="contact">
   <form >
      <h1 style="text-align:center;">Contactez-nous</h1>
      <div class="separation"></div>
      <div class="corps-formulaire">
        <div class="gauche">
          <div class="groupe">
            <label>Votre Nom</label>
            <input type="text" placeholder="Nom" name="nom" required />
          </div>
			<div class="groupe">
            <label>Votre Post-Nom</label>
            <input type="text" placeholder="Votre Post-Nom" name="postnom" required/>
          </div>
		<div class="groupe">
            <label>Votre Prenom</label>
            <input type="text" placeholder="Votre Prenom" name="prenom" required/>
          </div>
          <br>
          <div>
            <label>Sexe</label>
            <input type="radio" name="sexe" value="M" name="sexe"/>M
			      <input type="radio" name="sexe" value="F" />F
          </div> 
          <div class="groupe" >
            <label>Votre adresse e-mail</label>
            <input type="email" placeholder="Email" name="email" required />
          </div>
          <div class="groupe">
            <label>Votre numero téléphone</label>
            <input type="number" placeholder="telephone" name="tel" required />
          </div>
        </div>
        <div class="droite">
          <div class="groupe">
            <label>Commentaire</label>
            <textarea placeholder="Saisissez ici..." name="commentaire" required></textarea>
          </div>
        </div>
      </div>

      <div class="pied-formulaire" align="center">
        <button type="submit" >Envoyer</button>
      </div>
    </form>
	</div>
	<script src="../public/js/main.js"></script>
</body>
</html>
